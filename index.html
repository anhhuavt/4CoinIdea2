<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss 4-Coin Edition</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0d0d0f; overflow-x: hidden; font-family: 'Barlow Condensed', sans-serif; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Coin 3D ── */
        .coin-scene { perspective: 800px; }
        .coin-body { transform-style: preserve-3d; }
        .coin-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        @keyframes flipCoin {
            0%   { transform: rotateX(0deg) rotateY(0deg) translateY(0px) scale(1); }
            30%  { transform: rotateX(720deg) rotateY(180deg) translateY(-60px) scale(1.1); }
            70%  { transform: rotateX(1440deg) rotateY(360deg) translateY(-60px) scale(1.1); }
            100% { transform: rotateX(var(--final-rotX)) rotateY(var(--final-rotY)) translateY(0px) scale(1); }
        }

        /* ── Jackpot glows ── */
        @keyframes majorGlow { 0%,100%{box-shadow:0 0 14px 5px rgba(250,204,21,.5)} 50%{box-shadow:0 0 36px 14px rgba(250,204,21,1)} }
        .major-glow { animation: majorGlow 0.8s ease-in-out infinite; }

        /* ── Tier pill pulse ── */
        @keyframes tierPulse { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(1.04)} }
        .tier-pulse { animation: tierPulse .7s ease-in-out infinite; }

        /* ── Win message ── */
        @keyframes winPop {
            0%  { opacity:0; transform:translate(-50%,-50%) scale(.4); }
            65% { transform:translate(-50%,-50%) scale(1.08); }
            100%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
        }
        .win-pop { animation: winPop .45s cubic-bezier(.34,1.56,.64,1) forwards; }

        /* ── Jackpot banner ── */
        @keyframes bannerDrop {
            0%  { opacity:0; transform:translate(-50%,-50%) translateY(-50px) scale(.8); }
            70% { transform:translate(-50%,-50%) translateY(6px) scale(1.04); }
            100%{ opacity:1; transform:translate(-50%,-50%) translateY(0) scale(1); }
        }
        .banner-drop { animation: bannerDrop .55s cubic-bezier(.34,1.56,.64,1) forwards; }

        /* ── Particles ── */
        @keyframes particle { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0} }
        .particle { animation: particle .9s ease-out forwards; }

        /* ── Flying chips ── */
        @keyframes chipFlyDown {
            0%   { transform: translate(-50%,-50%) scale(0.4) rotate(var(--rot)); opacity:0; }
            15%  { opacity: 1; }
            100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(calc(var(--rot) + 180deg)); opacity:1; }
        }
        @keyframes chipFlyUp {
            0%   { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
            80%  { opacity: 0.6; }
            100% { transform: translate(calc(-50% + var(--ux)), calc(-50% + var(--uy))) scale(0.3) rotate(var(--rot)); opacity:0; }
        }
        .chip-fly-down { animation: chipFlyDown var(--dur) cubic-bezier(.2,.8,.4,1) forwards; }
        .chip-fly-up   { animation: chipFlyUp  0.7s cubic-bezier(.4,0,.8,.3) forwards; }

        /* ── Lightning Panel Effects ── */
        @keyframes sweepAcross {
            0%   { transform: translateX(-150%) skewX(-15deg); opacity:0; }
            15%  { opacity: 1; }
            85%  { opacity: 1; }
            100% { transform: translateX(150%) skewX(-15deg); opacity:0; }
        }
        .sweep-flash { animation: sweepAcross 0.6s ease-in-out forwards; }
        @keyframes panelLightUp {
            0%,100% { box-shadow: inset 0 0 0px transparent; }
            40%     { box-shadow: inset 0 0 40px 10px rgba(250,204,21,0.6); }
        }
        .panel-light-up { animation: panelLightUp 0.8s ease-in-out forwards; }
        @keyframes oddsFlip {
            0%   { opacity:1; transform:scaleY(1); }
            40%  { opacity:0; transform:scaleY(0); }
            60%  { opacity:0; transform:scaleY(0); }
            100% { opacity:1; transform:scaleY(1); }
        }
        .odds-flip { animation: oddsFlip 0.5s ease-in-out forwards; }
        @keyframes boltBounce {
            0%,100%{ transform: scale(1) rotate(-5deg); }
            50%{ transform: scale(1.3) rotate(5deg); }
        }
        .bolt-bounce { animation: boltBounce .5s ease-in-out infinite; }

        /* Text Shadows - Modified for better readability */
        .text-outline {
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 2px 2px 4px rgba(0,0,0,0.8);
        }
        .text-outline-light {
            text-shadow: -1px -1px 0 rgba(0,0,0,0.5), 1px -1px 0 rgba(0,0,0,0.5), -1px 1px 0 rgba(0,0,0,0.5), 1px 1px 0 rgba(0,0,0,0.5);
        }
        .text-outline-strong {
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0px 4px 6px rgba(0,0,0,0.9);
        }
        
        /* Modal Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Icons ────────────────────────────────────────────────────────────────────
const Ico = ({ d, size=24, sw=2, cls="" }) => (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
         fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round"
         strokeLinejoin="round" className={cls}>{d}</svg>
);
const IconInfo  = p => <Ico {...p} d={<><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>}/>;
const IconMenu  = p => <Ico {...p} d={<><line x1="4" x2="20" y1="6"  y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></>}/>;
const IconX     = p => <Ico {...p} d={<><path d="M18 6 6 18"/><path d="M6 6l12 12"/></>}/>;
const IconUndo  = p => <Ico {...p} d={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>}/>;
const IconUsers = p => <Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>;
const IconUser  = p => <Ico {...p} d={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>}/>;
const IconSwap  = p => <Ico {...p} d={<><path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/></>}/>;
const IconTrophy= p => <Ico {...p} d={<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>}/>;

// ─── Constants & Game Configuration ───────────────────────────────────────────
const PHASES = { BETTING:'BETTING', BONUS:'BONUS', FLIPPING:'FLIPPING', PAYOUT:'PAYOUT' };
const PHASE_TIMES = { BETTING:6, BONUS:3, FLIPPING:4, PAYOUT:3 };
const CHIP_VALUES = [10, 50, 100, 500, 1000];

const JACKPOT_TIERS = {
    JACKPOT: { name:'JACKPOT', mult:100, glowClass:'major-glow', color:'#eab308', accent:'#fef08a' }
};

// Updated Payouts (Even/Odd, 2 Heads/Tails, 3 Heads/Tails, and 4 Heads/Tails)
const BET_OPTIONS = {
    EVEN: { id: 'EVEN', label: 'EVEN', oddsStr: '1 : 0.9',  baseMult: 1.9,  bonusStr: '1 : 1.1', bonusMult: 2.1, check: (h) => h % 2 === 0,  titleColor: 'text-red-500', gridClass: 'col-span-3' },
    ODD:  { id: 'ODD',  label: 'ODD',  oddsStr: '1 : 0.9',  baseMult: 1.9,  bonusStr: '1 : 1.1', bonusMult: 2.1, check: (h) => h % 2 !== 0,  titleColor: 'text-blue-400', gridClass: 'col-span-3' },
    H3T1: { id: 'H3T1', label: '3 HEADS 1 TAIL',  oddsStr: '1 : 2.7',  baseMult: 3.7,  bonusStr: '1 : 3.5',  bonusMult: 4.5,  check: (h) => h === 3,      titleColor: 'text-white', gridClass: 'col-span-2' },
    H2T2: { id: 'H2T2', label: '2 HEADS 2 TAILS', oddsStr: '1 : 1.4',  baseMult: 2.4,  bonusStr: '1 : 2.0',  bonusMult: 3.0,  check: (h) => h === 2,      titleColor: 'text-white', gridClass: 'col-span-2' },
    H1T3: { id: 'H1T3', label: '1 HEADS 3 TAILS', oddsStr: '1 : 2.7',  baseMult: 3.7,  bonusStr: '1 : 3.5',  bonusMult: 4.5,  check: (h) => h === 1,      titleColor: 'text-white', gridClass: 'col-span-2' },
    H4:   { id: 'H4',   label: 'ALL HEADS',       oddsStr: '1 : 13.5', baseMult: 14.5, bonusStr: '1 : 20.0', bonusMult: 21.0, check: (h) => h === 4,      titleColor: 'text-yellow-300', gridClass: 'col-span-3' },
    T4:   { id: 'T4',   label: 'ALL TAILS',       oddsStr: '1 : 13.5', baseMult: 14.5, bonusStr: '1 : 20.0', bonusMult: 21.0, check: (h) => h === 0,      titleColor: 'text-yellow-300', gridClass: 'col-span-3' },
};

const getInitBets = () => Object.keys(BET_OPTIONS).reduce((acc, key) => ({ ...acc, [key]: 0 }), {});
const getInitChipArrays = () => Object.keys(BET_OPTIONS).reduce((acc, key) => ({ ...acc, [key]: [] }), {});

// ─── Coin SVG ─────────────────────────────────────────────────────────────────
const CoinFace = ({ side, jackpotTier=null }) => {
    const isH = side === 'H';
    let outerGrad, innerGrad, textColor, borderColor;
    
    if (jackpotTier === 'JACKPOT') {
        outerGrad=['#ffe066','#ffc200','#e09000','#a06000']; innerGrad=['#fff3a0','#ffd700','#e0a800']; textColor='#5a3a00'; borderColor='#ffd700';
    } else if (isH) {
        outerGrad=['#f59e42','#d97706','#b45309','#7c3d0c']; innerGrad=['#fde68a','#f59e42','#d97706']; textColor='#7c3d0c'; borderColor='#fbbf24';
    } else {
        outerGrad=['#e2e8f0','#94a3b8','#64748b','#334155']; innerGrad=['#f8fafc','#cbd5e1','#94a3b8']; textColor='#334155'; borderColor='#cbd5e1';
    }

    const id=`cg-${side}-${jackpotTier||'n'}-${Math.random().toString(36).substr(2,5)}`;
    const igId=`ig-${side}-${jackpotTier||'n'}-${Math.random().toString(36).substr(2,5)}`;
    const rId=`rg-${side}-${jackpotTier||'n'}-${Math.random().toString(36).substr(2,5)}`;
    
    return (
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style={{width:'100%',height:'100%',display:'block'}}>
            <defs>
                <radialGradient id={id} cx="40%" cy="35%">
                    <stop offset="0%" stopColor={outerGrad[0]}/><stop offset="40%" stopColor={outerGrad[1]}/>
                    <stop offset="75%" stopColor={outerGrad[2]}/><stop offset="100%" stopColor={outerGrad[3]}/>
                </radialGradient>
                <radialGradient id={igId} cx="45%" cy="40%">
                    <stop offset="0%" stopColor={innerGrad[0]}/><stop offset="55%" stopColor={innerGrad[1]}/>
                    <stop offset="100%" stopColor={innerGrad[2]}/>
                </radialGradient>
                <linearGradient id={rId} x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stopColor="rgba(255,255,255,0.6)"/><stop offset="50%" stopColor="rgba(255,255,255,0)"/>
                    <stop offset="100%" stopColor="rgba(0,0,0,0.2)"/>
                </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="49" fill={`url(#${id})`} stroke={borderColor} strokeWidth="1.5"/>
            {[...Array(36)].map((_,i)=>{
                const a=(i/36)*Math.PI*2, x1=50+44*Math.cos(a), y1=50+44*Math.sin(a), x2=50+48*Math.cos(a), y2=50+48*Math.sin(a);
                return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={borderColor} strokeWidth="0.8" opacity="0.5"/>;
            })}
            <circle cx="50" cy="50" r="38" fill={`url(#${igId})`} stroke="rgba(255,255,255,0.3)" strokeWidth="0.8"/>
            <ellipse cx="38" cy="34" rx="14" ry="8" fill={`url(#${rId})`} opacity="0.7"/>
            
            {jackpotTier==='JACKPOT' && <><text x="26" y="32" fontSize="8" fill="#ffd700" opacity="0.8">✦</text><text x="74" y="28" fontSize="6" fill="#ffd700" opacity="0.7">✦</text></>}
            
            <text x="50" y="57" textAnchor="middle" dominantBaseline="middle" fontSize="32" fontWeight="900" fill={textColor} fontFamily="serif" opacity="0.85">{isH?'H':'T'}</text>
            
            <circle cx="50" cy="50" r="49" fill={`url(#${rId})`} opacity="0.15"/>
        </svg>
    );
};

const MiniCoin = ({ type }) => {
    const cfg = {
        REGULAR: { outer:['#f59e42','#d97706','#b45309','#7c3d0c'], inner:['#fde68a','#f59e42','#d97706'], border:'#fbbf24', symbol:'M', symColor:'#7c3d0c', symSize:32 },
    }[type];
    const id = `mc-${type}-${Math.random().toString(36).substr(2,5)}`;
    return (
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style={{width:'100%',height:'100%',display:'block'}}>
            <defs>
                <radialGradient id={`${id}o`} cx="38%" cy="32%">
                    <stop offset="0%" stopColor={cfg.outer[0]}/><stop offset="45%" stopColor={cfg.outer[1]}/>
                    <stop offset="78%" stopColor={cfg.outer[2]}/><stop offset="100%" stopColor={cfg.outer[3]}/>
                </radialGradient>
                <radialGradient id={`${id}i`} cx="42%" cy="38%">
                    <stop offset="0%" stopColor={cfg.inner[0]}/><stop offset="55%" stopColor={cfg.inner[1]}/>
                    <stop offset="100%" stopColor={cfg.inner[2]}/>
                </radialGradient>
            </defs>
            <circle cx="50" cy="50" r="48" fill={`url(#${id}o)`} stroke={cfg.border} strokeWidth="3"/>
            <circle cx="50" cy="50" r="36" fill={`url(#${id}i)`} stroke="rgba(255,255,255,0.4)" strokeWidth="1"/>
            <text x="50" y="56" textAnchor="middle" dominantBaseline="middle" fontSize={cfg.symSize} fill={cfg.symColor} fontWeight="bold" opacity="0.9" fontFamily="sans-serif">{cfg.symbol}</text>
            <ellipse cx="37" cy="30" rx="14" ry="8" fill="rgba(255,255,255,0.6)" transform="rotate(-30 37 30)" opacity="0.6"/>
        </svg>
    );
};

const Chip = ({ value, colorClass }) => (
    <div className={`w-8 h-8 md:w-9 md:h-9 rounded-full border-2 border-dashed border-white/70 flex items-center justify-center text-[10px] md:text-[11px] font-black shadow-lg ${colorClass}`}>
        {value>=1000?`${value/1000}k`:value}
    </div>
);
const chipColor = v => {
    if (v===10)  return 'bg-gradient-to-br from-slate-400 to-slate-600 text-white';
    if (v===50)  return 'bg-gradient-to-br from-emerald-500 to-emerald-700 text-white';
    if (v===100) return 'bg-gradient-to-br from-sky-400 to-sky-700 text-white';
    if (v===500) return 'bg-gradient-to-br from-violet-400 to-violet-700 text-white';
    return 'bg-gradient-to-br from-yellow-300 to-amber-600 text-amber-950';
};

function App() {
    const [phase, setPhase]         = useState(PHASES.BETTING);
    const [timeLeft, setTimeLeft]   = useState(PHASE_TIMES[PHASES.BETTING]);
    const [balance, setBalance]     = useState(10000);

    const [playerBets, setPlayerBets] = useState(getInitBets());
    const [fakeBets, setFakeBets]     = useState(getInitBets());
    const [selectedChip, setSelectedChip] = useState(50);
    const [visualChips, setVisualChips]   = useState(getInitChipArrays());
    const [betHistory, setBetHistory]     = useState([]);
    const [isChipMenuOpen, setIsChipMenuOpen] = useState(false);

    // Modal & UI states
    const [showRules, setShowRules] = useState(false);
    const [showCheatMenu, setShowCheatMenu] = useState(false);
    const [cheats, setCheats]     = useState({ sureWin: false, jackpot: 'NONE', forceBonus: false });

    const [coinResults, setCoinResults] = useState([null, null, null, null]);
    const [hitTier, setHitTier]         = useState(null);
    const [lightningBonus, setLightningBonus] = useState({}); 
    const [bonusSweep, setBonusSweep]   = useState(null); 
    const [flyingChips, setFlyingChips] = useState([]);
    
    const [isFlipping, setIsFlipping]   = useState(false);
    const [lastWinInfo, setLastWinInfo] = useState(null);
    
    const [history, setHistory] = useState([
        ['H','H','H','H'], ['H','T','T','H'], ['T','T','H','H'], ['T','H','T','T'], 
        ['H','H','H','T'], ['T','T','T','T'], ['H','T','H','T'], ['H','H','H','H']
    ]);

    const fakeBetRef = useRef(null);
    const historyRef = useRef(null);
    const bonusCountRef = useRef(0);

    // ── Timer Logic ──
    useEffect(() => {
        if (phase === PHASES.FLIPPING) return;
        if (timeLeft > 0) {
            const t = setTimeout(() => setTimeLeft(n => n-1), 1000);
            return () => clearTimeout(t);
        } else { advancePhase(); }
    }, [timeLeft, phase]);

    const advancePhase = () => {
        if      (phase===PHASES.BETTING) doBonusCheck();
        else if (phase===PHASES.BONUS)   doFlip();
        else                             startBetting();
    };

    useEffect(() => {
        if (phase !== PHASES.BETTING) { clearInterval(fakeBetRef.current); return; }
        fakeBetRef.current = setInterval(() => {
            setFakeBets(prev => {
                const next = { ...prev };
                const keys = Object.keys(BET_OPTIONS);
                keys.forEach(k => {
                    if (Math.random() > 0.4) {
                        let amount = Math.floor(Math.random() * 500);
                        if (k === 'EVEN' || k === 'ODD') amount *= 2;
                        if (Math.random() > 0.95) amount += 5000;
                        next[k] += amount;
                    }
                });
                return next;
            });
        }, 300);
        return () => clearInterval(fakeBetRef.current);
    }, [phase]);

    const flyIntervalRef = useRef(null);
    useEffect(() => {
        if (phase !== PHASES.BETTING) { clearInterval(flyIntervalRef.current); return; }
        flyIntervalRef.current = setInterval(() => {
            const keys = Object.keys(BET_OPTIONS);
            const target = keys[Math.floor(Math.random()*keys.length)];
            const vals = [10, 50, 100];
            const val = vals[Math.floor(Math.random()*vals.length)];
            
            const destMap = {
                EVEN: {x: 25, y: 15}, ODD: {x: 75, y: 15},
                H3T1: {x: 20, y: 50}, H2T2: {x: 50, y: 50}, H1T3: {x: 80, y: 50},
                H4:   {x: 25, y: 85}, T4: {x: 75, y: 85}
            };
            
            setFlyingChips(prev => [...prev, {
                id: Math.random().toString(36).slice(2),
                target, val,
                destX: destMap[target].x + (Math.random()-0.5)*15,
                destY: destMap[target].y + (Math.random()-0.5)*15,
                rot: (Math.random()-0.5)*90,
                dur: 0.5 + Math.random()*0.3,
            }].slice(-30));
        }, 500);
        return () => clearInterval(flyIntervalRef.current);
    }, [phase]);

    const doBonusCheck = () => {
        setIsChipMenuOpen(false);
        
        let selected = [];
        const keys = Object.keys(BET_OPTIONS);
        if (cheats.jackpot === 'JACKPOT') {
            selected = keys.sort(() => 0.5 - Math.random()).slice(0, 5);
        } else if (cheats.forceBonus) {
            selected = Object.keys(playerBets).filter(k => playerBets[k] > 0);
        } else {
            const r = Math.random();
            const numBonuses = r < 0.1 ? 5 : (r < 0.3 ? 4 : (r < 0.6 ? 3 : 2));
            selected = keys.sort(() => 0.5 - Math.random()).slice(0, numBonuses);
        }
        
        bonusCountRef.current = selected.length;

        setPhase(PHASES.BONUS);
        setTimeLeft(PHASE_TIMES[PHASES.BONUS]);
        
        selected.forEach((k, i) => {
            setTimeout(() => {
                setLightningBonus(prev => ({...prev, [k]: true}));
                setBonusSweep(k);
            }, 250 + (i * 180)); 
        });
    };

    const doFlip = () => {
        setPhase(PHASES.FLIPPING);
        setBonusSweep(null);

        let results = Array.from({length: 4}, () => Math.random() > 0.5 ? 'H' : 'T');
        
        if (cheats.sureWin) {
            let highestBet = 0;
            let bestKey = null;
            for (const key in playerBets) {
                if (playerBets[key] > highestBet) {
                    highestBet = playerBets[key];
                    bestKey = key;
                }
            }
            if (bestKey) {
                const winMap = {
                    'EVEN': ['H','H','T','T'],
                    'ODD':  ['H','T','T','T'],
                    'H3T1': ['H','H','H','T'],
                    'H2T2': ['H','H','T','T'],
                    'H1T3': ['H','T','T','T'],
                    'H4':   ['H','H','H','H'],
                    'T4':   ['T','T','T','T']
                };
                results = winMap[bestKey];
            }
        }

        let tier = null;
        if (cheats.jackpot === 'JACKPOT' || bonusCountRef.current >= 5) {
            tier = 'JACKPOT';
        }

        setCoinResults(results);
        setHitTier(tier);
        setIsFlipping(true);

        setTimeout(() => {
            setIsFlipping(false);
            doPayout(results, tier);
        }, 3000); 
    };

    const doPayout = (results, tier) => {
        setPhase(PHASES.PAYOUT);
        setTimeLeft(PHASE_TIMES[PHASES.PAYOUT]);

        const headsCount = results.filter(r => r === 'H').length;
        
        let totalWin = 0;
        let hasBet = false;
        
        Object.keys(playerBets).forEach(key => {
            const betAmount = playerBets[key];
            if (betAmount > 0) {
                hasBet = true;
                const opt = BET_OPTIONS[key];
                if (opt.check(headsCount)) {
                    if (tier) {
                        totalWin += Math.floor(betAmount * JACKPOT_TIERS[tier].mult);
                    } else {
                        const mult = lightningBonus[key] ? opt.bonusMult : opt.baseMult;
                        totalWin += Math.floor(betAmount * mult);
                    }
                }
            }
        });

        if (totalWin > 0) {
            setBalance(b => b + totalWin);
            setLastWinInfo(`YOU WIN +$${totalWin.toLocaleString()}`);
        } else if (hasBet) {
            setLastWinInfo('YOU LOSE');
        } else {
            setLastWinInfo(null);
        }

        setHistory(prev => [results, ...prev].slice(0, 48));
        setFlyingChips([]);
    };

    const startBetting = () => {
        setPhase(PHASES.BETTING);
        setTimeLeft(PHASE_TIMES[PHASES.BETTING]);
        setPlayerBets(getInitBets());
        setFakeBets(getInitBets());
        setVisualChips(getInitChipArrays());
        setBetHistory([]);
        setCoinResults([null,null,null,null]);
        setHitTier(null);
        setLightningBonus({});
        bonusCountRef.current = 0;
        setBonusSweep(null);
        setLastWinInfo(null);
    };

    const handlePlaceBet = (key) => {
        if (phase !== PHASES.BETTING || balance < selectedChip) return;

        const id = Math.random().toString(36).slice(2);
        setBalance(b => b - selectedChip);
        setPlayerBets(p => ({ ...p, [key]: p[key] + selectedChip }));
        setBetHistory(p => [...p, { key, amount: selectedChip, id }]);
        
        setVisualChips(prev => {
            const arr = [...prev[key]];
            if (arr.length > 15) arr.shift();
            arr.push({ id, value: selectedChip, x: 30 + Math.random()*40, y: 30 + Math.random()*40 });
            return { ...prev, [key]: arr };
        });
    };

    const handleDouble = () => {
        if (phase !== PHASES.BETTING) return;
        const total = Object.values(playerBets).reduce((a,b)=>a+b,0);
        if (!total || balance < total) return;
        
        setBalance(b => b - total);
        Object.keys(playerBets).forEach(k => {
            if (playerBets[k] > 0) {
                const id = Math.random().toString(36).slice(2);
                setBetHistory(p => [...p, { key:k, amount:playerBets[k], id }]);
                setPlayerBets(p => ({ ...p, [k]: p[k]*2 }));
                
                setVisualChips(prev => {
                    const arr = [...prev[k]];
                    arr.push({ id, value: playerBets[k], x: 30 + Math.random()*40, y: 30 + Math.random()*40 });
                    return { ...prev, [k]: arr };
                });
            }
        });
    };

    const handleUndo = () => {
        if (phase !== PHASES.BETTING || !betHistory.length) return;
        const last = betHistory[betHistory.length-1];
        setBalance(b => b + last.amount);
        setPlayerBets(p => ({ ...p, [last.key]: p[last.key] - last.amount }));
        setVisualChips(p => ({ ...p, [last.key]: p[last.key].filter(c=>c.id!==last.id) }));
        setBetHistory(p => p.slice(0,-1));
    };

    const handleCancel = () => {
        if (phase !== PHASES.BETTING || !betHistory.length) return;
        setBalance(b => b + betHistory.reduce((s,b)=>s+b.amount,0));
        setPlayerBets(getInitBets());
        setVisualChips(getInitChipArrays());
        setBetHistory([]);
    };

    const isBettingOpen = phase === PHASES.BETTING;
    const hitTierData = hitTier ? JACKPOT_TIERS[hitTier] : null;

    const fmtMoney = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'k' : String(n);
    
    const isWinningPanel = (key) => {
        if (phase !== PHASES.PAYOUT) return false;
        const hCount = coinResults.filter(r=>r==='H').length;
        return BET_OPTIONS[key].check(hCount);
    };

    const beadPlate = history.map(r => {
        const h = r.filter(x=>x==='H').length;
        return h % 2 === 0 ? 'EVEN' : 'ODD';
    });
    
    useEffect(() => {
        if(historyRef.current) setTimeout(()=>historyRef.current.scrollTo({left:0,behavior:'smooth'}),50);
    }, [history]);

    return (
        <div className="min-h-screen bg-[#0d0d0f] flex items-center justify-center p-0 md:p-4 select-none relative font-['Barlow_Condensed']">
        <div className="w-full max-w-md h-[100dvh] md:h-[900px] md:rounded-2xl shadow-2xl relative flex flex-col"
             style={{background:'#4fb0c6', border:'3px solid #368294', overflow:'hidden'}}>

            {/* ── TOP HEADER: Users, Jackpot UI, Controls ── */}
            <div className="shrink-0 flex items-center justify-between px-3 pt-3 pb-1 z-[100] relative">
                <div className="flex items-center gap-1.5 bg-black/20 backdrop-blur-sm rounded-lg px-2.5 py-1.5 border border-white/10 shadow-sm min-w-[80px]">
                    <IconUsers size={14} cls="text-white/90"/>
                    <span className="text-white font-bold text-sm">{(9999).toLocaleString()}</span>
                </div>
                
                {/* Single x100 Jackpot Pill */}
                <div onClick={() => setShowRules(true)} className="cursor-pointer bg-black text-[#fde047] font-black text-2xl md:text-3xl px-7 py-0.5 rounded-full border-2 border-[#ca8a04] shadow-[0_0_15px_rgba(202,138,4,0.6)] flex items-center justify-center tracking-wide hover:scale-105 transition-transform active:scale-95">
                    x100
                </div>

                <div className="flex items-center gap-2 min-w-[80px] justify-end">
                    <div onClick={() => setShowRules(true)} className="w-7 h-7 rounded-full bg-black/60 flex items-center justify-center text-white font-black text-sm border border-white/20 shadow-sm cursor-pointer hover:bg-black/80 transition-colors">
                        <IconInfo size={16}/>
                    </div>
                    {/* Menu triggers cheat panel */}
                    <div onClick={() => setShowCheatMenu(!showCheatMenu)} className="w-7 h-7 rounded-full bg-black/60 flex items-center justify-center text-white cursor-pointer hover:bg-black/80 border border-white/20 shadow-sm relative transition-colors">
                        <IconMenu size={16}/>
                    </div>
                </div>

                {/* Cheat Menu Panel */}
                {showCheatMenu && (
                    <div className="absolute top-12 right-3 w-56 bg-black/90 backdrop-blur-md rounded-xl border border-white/20 shadow-2xl p-3 flex flex-col gap-2 z-[100]">

                        <label className="flex items-center justify-between text-xs font-bold text-white cursor-pointer hover:bg-white/10 p-1.5 rounded transition-colors">
                            <span>Force Sure Win</span>
                            <input type="checkbox" checked={cheats.sureWin} onChange={(e) => setCheats(c => ({...c, sureWin: e.target.checked}))} className="w-4 h-4 accent-green-500" />
                        </label>
                        
                        <label className="flex items-center justify-between text-xs font-bold text-white cursor-pointer hover:bg-white/10 p-1.5 rounded transition-colors">
                            <span>Force Bonus on Bets</span>
                            <input type="checkbox" checked={cheats.forceBonus} onChange={(e) => setCheats(c => ({...c, forceBonus: e.target.checked}))} className="w-4 h-4 accent-yellow-400" />

                        <div className="border-t border-white/20 mt-1 pt-2">

                            <select

                                className="w-full bg-white/10 text-white text-xs p-1.5 rounded border border-white/20 focus:outline-none focus:border-cyan-400"
                            >
                                <option value="NONE">Normal Chance</option>
                                <option value="JACKPOT">Force Jackpot (x100)</option>
                            </select>
                        </div>
                    </div>
                )}

            <div className="shrink-0 flex justify-center items-start px-3 z-30 relative mt-1 h-[52px] md:h-[60px]">
                {/* 5 Lightning Boxes */}
                <div className="flex gap-1 md:gap-1.5 bg-white/20 p-1 md:p-1.5 rounded-lg border border-white/10 shadow-inner backdrop-blur-sm">
                    {[1,2,3,4,5].map(i => {
                        const isActive = Object.keys(lightningBonus).length >= i;
                        return (
                            <div key={i} className={`w-9 h-10 md:w-11 md:h-12 rounded flex items-center justify-center transition-all duration-300

                                <svg viewBox="0 0 24 24" fill={isActive ? "#ffffff" : "#4b5563"} className="w-5 h-5 md:w-6 md:h-6" style={isActive ? {filter:'drop-shadow(0 2px 2px rgba(0,0,0,0.3))'} : {}}>
                                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                                </svg>
                            </div>
                        );
                    })}
                </div>
                
                {/* Min/Max correctly aligned */}
                <div className="absolute right-3 top-0 flex items-center gap-1 bg-black/60 rounded-full px-2.5 py-1 text-[9px] font-bold text-white whitespace-nowrap border border-white/10 shadow-sm pointer-events-auto">
                    <span>Min: 999.99K</span>
                    <IconSwap size={10} cls="mx-0.5"/>

            <div className="flex-1 flex flex-col items-center justify-center z-30 relative min-h-[160px] mt-1 mb-2 pointer-events-none">

                    <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 win-pop whitespace-nowrap font-black text-3xl text-outline-strong drop-shadow-2xl

                    </div>

                {phase===PHASES.PAYOUT && hitTierData && (
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 banner-drop whitespace-nowrap">
                        <div className="px-5 py-2 rounded-2xl font-black text-3xl shadow-2xl border-4 bg-black/90"
                             style={{borderColor:hitTierData.color, color:hitTierData.accent, textShadow:`0 0 15px ${hitTierData.color}`}}>
                            🎰 {hitTierData.name} x{hitTierData.mult}!
                        </div>
                    </div>
                )}

                {/* Coin Grid */}
                <div className="grid grid-cols-2 gap-2 md:gap-3 shrink-0 pointer-events-auto">
                    {[0,1,2,3].map(i => (

                            <div className="coin-body w-full h-full"
                                 style={{
                                     transformStyle:'preserve-3d',

                                     animation:isFlipping ? `flipCoin 2s cubic-bezier(.4,0,.2,1) forwards` : 'none',
                                     animationDelay: `${i * 0.1}s`,
                                     '--final-rotX': '0deg',
                                     '--final-rotY': coinResults[i]==='H' ? '1800deg' : '1980deg',
                                 }}>
                                <div className="coin-face absolute inset-0" style={{backfaceVisibility:'hidden'}}>
                                    <CoinFace side="H"/>
                                </div>
                                <div className="coin-face absolute inset-0" style={{backfaceVisibility:'hidden',transform:'rotateY(180deg)'}}>
                                    <CoinFace side="T"/>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>

                {/* Status indicator pill */}
                <div className="z-40 mt-3 md:mt-4 shrink-0 pointer-events-auto">
                    <div className="px-6 py-1.5 md:py-2 rounded-full bg-[#9f6f36] border-2 border-white text-white shadow-[0_6px_15px_rgba(0,0,0,0.6)] flex flex-col items-center leading-none">
                        <span className="text-[10px] md:text-[11px] font-bold uppercase tracking-wider">{phase === PHASES.BETTING ? 'Place bet now' : phase === PHASES.BONUS ? 'Lightning!' : 'Result'}</span>
                        <span className="text-2xl md:text-3xl font-black drop-shadow-md">{timeLeft}</span>
                    </div>
                </div>
            </div>

            <div className="shrink-0 bg-[#8b5a2b] p-1.5 md:p-2 pb-2.5 md:pb-4 border-t-[6px] border-[#5a3a18] relative z-20 shadow-[0_-10px_20px_rgba(0,0,0,0.3)]">
                <div className="grid grid-cols-6 gap-1.5 md:gap-2">
                    {Object.values(BET_OPTIONS).map((opt) => {
                        const key = opt.id;
                        const isLight = lightningBonus[key];
                        const isSweeping = bonusSweep === key;
                        const isWinner = isWinningPanel(key);
                        const currentMult = isLight ? opt.bonusMult : opt.baseMult;
                        const currentOddsStr = isLight ? opt.bonusStr : opt.oddsStr;
                        
                        return (
                            <div key={key} onClick={()=>handlePlaceBet(key)}
                                className={`${opt.gridClass} rounded-xl relative overflow-hidden flex flex-col shadow-lg transition-all duration-200 border-2
                                    ${isBettingOpen ? 'cursor-pointer hover:brightness-110 active:scale-[.98]' : ''}
                                    ${isWinner ? 'border-yellow-400 scale-[1.02] ring-4 ring-yellow-400/50 z-10' : 'border-[#3f250a]'}
                                    ${isSweeping||(bonusSweep==='DONE'&&!isLight) ? 'panel-light-up' : ''}`}
                                style={{background: 'linear-gradient(to bottom, #d2b48c, #b59063)'}}>
                                
                                {isSweeping && isLight && (
                                    <div className="absolute inset-0 z-40 pointer-events-none overflow-hidden rounded-xl">
                                        <div className="sweep-flash absolute inset-y-0 w-[150%] left-[-25%]"
                                             style={{background:'linear-gradient(105deg, transparent 0%, rgba(250,204,21,0.2) 30%, rgba(250,204,21,0.8) 50%, rgba(250,204,21,0.2) 70%, transparent 100%)'}}/>
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <span className="text-5xl bolt-bounce" style={{filter:'drop-shadow(0 0 10px #facc15)'}}>⚡</span>
                                        </div>
                                    </div>
                                )}

                                <div className="absolute inset-1 rounded-lg border border-[#a37a52] pointer-events-none"></div>

                                <div className={`pt-1 md:pt-1.5 text-center text-[15px] md:text-lg font-black tracking-wider ${opt.titleColor} text-outline z-10 leading-tight drop-shadow-md`}>
                                    {opt.label}
                                </div>
                                
                                {(key==='H3T1'||key==='H2T2'||key==='H1T3') && (
                                    <div className="flex justify-center gap-1 mt-1 z-10">
                                        {[...Array(parseInt(key[1]))].map((_,i)=><div key={`h${i}`} className="w-4 h-4"><MiniCoin type="REGULAR"/></div>)}
                                        {[...Array(parseInt(key[3]))].map((_,i)=><div key={`t${i}`} className="w-4 h-4 opacity-70 grayscale"><MiniCoin type="REGULAR"/></div>)}
                                    </div>
                                )}

                                <div className="flex-1 flex items-center justify-center relative pb-1.5 pt-0.5 z-10">
                                    <div className={`text-xl md:text-2xl font-black text-outline transition-colors
                                        ${isLight ? 'text-yellow-300' : 'text-yellow-400'}
                                        ${isSweeping && isLight ? 'odds-flip' : ''}`}>
                                        {currentOddsStr}
                                    </div>
                                    
                                    <div className={`absolute bottom-1 right-2 text-xl transition-opacity duration-300 ${isLight ? 'opacity-100 text-yellow-300 drop-shadow-[0_0_5px_#facc15]' : 'opacity-30 text-black'}`}>
                                        ⚡
                                    </div>
                                </div>

                                <div className="absolute inset-0 pointer-events-none overflow-hidden z-20">
                                    {flyingChips.filter(c=>c.target===key).map(c=>(
                                        <div key={c.id} className="chip-fly-down absolute"
                                             style={{
                                                 left:`${c.destX}%`, top:`${c.destY}%`,
                                                 '--rot':`${c.rot}deg`, '--dur':`${c.dur}s`, '--dx':'0px', '--dy':'0px'
                                             }}>
                                            <Chip value={c.val} colorClass={chipColor(c.val)}/>
                                        </div>
                                    ))}
                                    {visualChips[key].map(c=>(
                                        <div key={c.id} className="absolute transition-all duration-300" style={{left:`${c.x}%`,top:`${c.y}%`,transform:'translate(-50%,-50%)'}}>
                                            <Chip value={c.value} colorClass={chipColor(c.value)}/>
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="absolute top-1 right-1.5 bg-black/40 text-white/90 text-[8px] md:text-[9px] px-1.5 py-0.5 rounded flex items-center gap-1 border border-black/20 z-10">
                                    ${fmtMoney(fakeBets[key] + playerBets[key])}
                                </div>
                                
                                {playerBets[key] > 0 && (
                                    <div className="absolute bottom-1 left-1.5 bg-blue-600 text-white text-[9px] px-2 py-0.5 rounded font-black border border-blue-400 z-10 shadow-md">
                                        ${fmtMoney(playerBets[key])}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            </div>

            <div className="h-[60px] md:h-[70px] shrink-0 bg-[#c5a880] border-t-4 border-[#8b5a2b] px-2 flex items-center justify-between relative z-40 shadow-[0_-5px_15px_rgba(0,0,0,0.2)]">
                
                {/* Player Profile & Balance */}
                <div className="flex items-center bg-black/60 rounded-full pl-1 pr-3 border border-[#3f250a] shadow-inner">
                    <div className="w-10 h-10 md:w-12 md:h-12 rounded-full border-[3px] border-[#c5a880] flex items-center justify-center shrink-0 -ml-1 relative bg-gradient-to-br from-blue-400 to-blue-600">
                        <IconUser size={20} cls="text-white"/>
                    </div>
                    <div className="ml-2 flex flex-col justify-center pb-0.5 min-w-[70px]">
                        <div className="text-[10px] text-white/80 font-bold leading-tight">Player Name</div>
                        <div className="text-sm font-black text-yellow-400 leading-tight flex items-center gap-1">
                            <span className="text-[10px]">🪙</span> {balance.toLocaleString()}
                        </div>
                    </div>
                </div>

                {/* Central Chip Selector */}
                <div className="relative flex items-center justify-center h-full px-2">
                    {isBettingOpen && (
                        <div className="relative">
                            {isChipMenuOpen && (
                                <div className="absolute bottom-[120%] left-1/2 -translate-x-1/2 flex flex-col gap-1.5 bg-black/80 backdrop-blur-sm p-2 rounded-full border border-white/20 shadow-2xl z-[100]">
                                    {CHIP_VALUES.map(v=>(
                                        <div key={v} onClick={()=>{setSelectedChip(v);setIsChipMenuOpen(false);}} className="cursor-pointer hover:scale-110 active:scale-95 transition-transform">
                                            <Chip value={v} colorClass={chipColor(v)}/>
                                        </div>
                                    ))}
                                </div>
                            )}
                            <div onClick={()=>setIsChipMenuOpen(!isChipMenuOpen)}
                                className="cursor-pointer hover:scale-110 active:scale-95 transition-all w-11 h-11 md:w-12 md:h-12 bg-white/10 rounded-full flex items-center justify-center border border-black/20 shadow-inner drop-shadow-md">
                                <Chip value={selectedChip} colorClass={chipColor(selectedChip)}/>
                            </div>
                        </div>
                    )}
                    {!isBettingOpen && (

                        </div>

                </div>

                {/* Action Buttons */}
                <div className="flex items-center gap-2">
                    <button onClick={handleUndo} disabled={!isBettingOpen} className={`w-9 h-9 md:w-10 md:h-10 bg-white rounded-full flex items-center justify-center border-[3px] border-gray-300 shadow-md ${isBettingOpen ? 'active:scale-95 text-gray-800' : 'opacity-50 text-gray-400'}`}>
                        <IconUndo size={16} sw={3}/>
                    </button>
                    <button onClick={handleCancel} disabled={!isBettingOpen} className={`w-9 h-9 md:w-10 md:h-10 bg-white rounded-full flex items-center justify-center border-[3px] border-red-200 shadow-md ${isBettingOpen ? 'active:scale-95 text-red-600' : 'opacity-50 text-gray-400'}`}>

            <div className="h-[90px] md:h-[110px] shrink-0 bg-white flex border-t border-gray-300 relative z-30">

                    </div>
                </div>

                <div className="flex-1 p-1 flex gap-1 overflow-x-auto no-scrollbar bg-[linear-gradient(to_right,#f0f0f0_1px,transparent_1px),linear-gradient(to_bottom,#f0f0f0_1px,transparent_1px)]" style={{backgroundSize:'20px 20px'}}>
                     {Array.from({length: Math.ceil(history.length / 6)}).map((_, colIdx) => (
                        <div key={`bc${colIdx}`} className="flex flex-col gap-[6px] shrink-0 w-[14px]">
                            {history.slice(colIdx*6, colIdx*6+6).map((resArr, rowIdx) => {
                                const hCount = resArr.filter(r=>r==='H').length;
                                const pct = (hCount / 4) * 100;
                                return (
                                    <div key={`br${rowIdx}`} className="w-[14px] h-[14px] rounded-full border border-black/30 shadow-sm relative overflow-hidden bg-[#eab308]" title={`${hCount}H ${4-hCount}T`}>
                                        {pct > 0 && <div className="absolute inset-0" style={{background:`conic-gradient(#ef4444 ${pct}%, transparent 0)`}}></div>}
                                    </div>
                                )
                            })}
                        </div>
                    ))}
                </div>
                
                <div className="w-8 shrink-0 bg-gray-200 border-l border-gray-300 flex flex-col items-center py-2 gap-1">
                    <div className="w-4 h-4 rounded-full bg-red-600/30 border border-red-600"></div>
                    <div className="w-4 h-4 rounded-full bg-yellow-400/30 border border-yellow-500"></div>
                    <div className="w-4 h-4 rounded-full bg-blue-600/30 border border-blue-600"></div>
                </div>
            </div>

            {/* ── RULES / INFO MODAL ── */}
            {showRules && (
                <div className="absolute inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity duration-300">
                    <div className="bg-[#1a1a24] border-2 border-[#4fb0c6] rounded-2xl w-full max-w-sm max-h-[85%] overflow-hidden shadow-2xl relative flex flex-col">
                        
                        <div className="bg-gradient-to-r from-[#215a6b] to-[#368294] p-3 flex justify-between items-center shrink-0 shadow-md">
                            <h2 className="font-black text-2xl text-yellow-300 tracking-wider flex items-center gap-2">
                                <IconInfo size={24} cls="text-white"/> HOW TO PLAY
                            </h2>
                            <button onClick={() => setShowRules(false)} className="bg-black/30 hover:bg-black/50 text-white p-1 rounded-full transition-colors">
                                <IconX size={20} sw={3}/>
                            </button>
                        </div>
                        
                        <div className="p-4 overflow-y-auto custom-scroll text-gray-200 space-y-5 text-[15px] leading-snug">
                            
                            <section>
                                <h3 className="text-lg font-bold text-white mb-1.5 flex items-center gap-1.5 border-b border-white/10 pb-1">
                                    <span className="w-5 h-5 rounded bg-blue-500/20 text-blue-400 flex items-center justify-center text-sm font-black">1</span>
                                    Place Your Bets
                                </h3>
                                <p>Predict the outcome of 4 flipped coins. You can bet on <strong>Even/Odd</strong> number of Heads, or specific combinations like <strong>3 Heads 1 Tail</strong>, <strong>All Heads</strong>, etc.</p>
                            </section>

                            <section>
                                <h3 className="text-lg font-bold text-yellow-400 mb-1.5 flex items-center gap-1.5 border-b border-white/10 pb-1">
                                    <span className="text-xl">⚡</span> Lightning Bonus
                                </h3>
                                <p>After betting closes, random bet options may be struck by lightning. If your winning bet was struck, your payout is multiplied by the boosted odds shown in yellow!</p>
                            </section>

                            <section className="bg-black/40 rounded-xl p-3 border border-yellow-500/30 relative overflow-hidden">
                                <div className="absolute -right-4 -top-4 text-6xl opacity-10">🎰</div>
                                <h3 className="text-xl font-black text-yellow-300 mb-2 flex items-center gap-1.5">
                                    <IconTrophy size={20} cls="text-yellow-400"/> JACKPOT (x100)
                                </h3>
                                <p className="mb-2">5 Lightning Box trackers sit above the coins. Each lightning bonus that drops lights up one box.</p>
                                <p className="font-bold text-white mb-1 bg-yellow-500/20 px-2 py-1 rounded inline-block">
                                    Winning the Jackpot:
                                </p>
                                <p>If all <strong>5 lightning boxes</strong> light up during a single round, the Jackpot is triggered! Any winning bets you placed are multiplied by a massive <strong>100x</strong>!</p>
                            </section>

                            <section>
                                <h3 className="text-lg font-bold text-white mb-1.5 flex items-center gap-1.5 border-b border-white/10 pb-1">
                                    <span className="w-5 h-5 rounded bg-green-500/20 text-green-400 flex items-center justify-center text-sm font-black">$</span>
                                    Payout Adjustments
                                </h3>
                                <ul className="list-disc pl-5 space-y-1 text-sm text-gray-300">
                                    <li>Even / Odd: <span className="text-white font-bold">1.9x</span> (Lightning: 2.1x)</li>
                                    <li>2 Heads / 2 Tails: <span className="text-white font-bold">2.4x</span> (Lightning: 3.0x)</li>
                                    <li>3 Heads 1 Tail / 1 Head 3 Tails: <span className="text-white font-bold">3.7x</span> (Lightning: 4.5x)</li>
                                    <li>4 Heads / 4 Tails: <span className="text-white font-bold">14.5x</span> (Lightning: 21x)</li>
                                </ul>
                            </section>

                        </div>
                        
                        <div className="p-3 bg-black/40 shrink-0 text-center">
                            <button onClick={() => setShowRules(false)} className="w-full py-2.5 rounded-lg bg-gradient-to-r from-[#368294] to-[#4fb0c6] text-white font-black text-lg tracking-wider hover:brightness-110 active:scale-[0.98] transition-all shadow-md">
                                GOT IT, LET'S PLAY!
                            </button>
                        </div>
                    </div>
                </div>
            )}

        </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
