name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # Thay bằng tên branch của bạn nếu không phải main (ví dụ: master)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Đã cập nhật bản mới hỗ trợ Node 24
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5 # Đã cập nhật bản mới hỗ trợ Node 24
        with:
          path: '.' # Upload toàn bộ thư mục hiện tại (nơi có file index của bạn)
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
